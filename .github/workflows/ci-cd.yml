name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run build

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Key
        run: echo "${{ secrets.EC2_KEY }}" > key.pem

      - name: Fix Permissions
        run: chmod 600 key.pem

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Set project path (where to deploy on EC2)
            PROJECT_PATH="${{ secrets.EC2_PROJECT_PATH }}"
            
            # ============================================
            # CHECK AND INSTALL DOCKER IF MISSING
            # ============================================
            if ! command -v docker &> /dev/null; then
              echo "Docker not found. Installing Docker..."
              
              # Update package index
              sudo apt-get update
              
              # Install prerequisites
              sudo apt-get install -y ca-certificates curl gnupg lsb-release
              
              # Add Docker's official GPG key
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg
              
              # Set up Docker repository
              echo \
                "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \
                $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              
              # Install Docker Engine
              sudo apt-get update
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              
              # Add current user to docker group (allows running docker without sudo)
              sudo usermod -aG docker $USER
              
              # Start Docker service
              sudo systemctl start docker
              sudo systemctl enable docker
              
              echo "Docker installed successfully!"
            else
              echo "Docker is already installed."
            fi
            
            # ============================================
            # DEPLOY APPLICATION
            # ============================================
            # Navigate to app directory (or clone if first deploy)
            if [ ! -d "$PROJECT_PATH" ]; then
              git clone https://github.com/wandr0057-art/DREAMSTATICFAUX "$PROJECT_PATH"
            fi
            cd "$PROJECT_PATH"
            
            # Pull latest code from main branch
            git pull origin main
            
            # Rebuild and restart containers
            sudo docker compose down
            sudo docker compose up --build -d
            
            # Run database migrations on production
            # Uses installed Prisma version, not npx (prevents version mismatch)
            sudo docker compose exec -T app npm run migrate
            
            # Optional: Show running containers
            sudo docker compose ps
            