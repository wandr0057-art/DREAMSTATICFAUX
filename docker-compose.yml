services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    # For production containers we do not mount source directories into /app,
    # because this hides the built artifacts produced in the image.
    # (Volumemounts are useful for local dev only.)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 40s
    command: ["node", "server.js"]

